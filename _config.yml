# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
baseurl: "" # the subpath of your site, e.g. /blog

# Build settings
markdown: kramdown
plugins:
  - jekyll-email-protect

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# timezone: Asia/Shanghai

collections:
  - publications
  - news
  - showcase

# Optional website analytics for your deployed site.
# Static GitHub Pages cannot identify visitors by name unless they log in or submit a form,
# but you can record aggregate visits with a service such as GoatCounter.
analytics:
  enabled: true
  provider: "goatcounter" # supported: plausible, goatcounter
  plausible_domain: ""
  plausible_script_src: ""
  goatcounter_url: "https://austinyang.goatcounter.com/count"

# Public visitor map widget. Clicking it opens the country breakdown page.
visitor_map:
  enabled: true
  title: "Visitor Map"
  link_url: "https://info.flagcounter.com/bKrg"
  image_url: "https://s01.flagcounter.com/map/bKrg/size_s/txt_000000/border_CCCCCC/pageviews_1/viewers_0/flags_0/"
  alt: "Visitor map from Flag Counter"
  caption: "Public country map powered by Flag Counter."
