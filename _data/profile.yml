short_bio: >-
  <p>
    I am a PhD student in the Department of Computer Science and Technology at the University of Cambridge, supervised by Prof. Rika Antonova. My research focuses on robotics,
    both in hardware and software. I am particularly interested in the design and control of robotic systems, as well as their applications in various domains such as manipulation, locomotion, and human-robot interaction. I have a background in mechanical engineering, and I am passionate about building robots that can interact with the world in a meaningful way.
  </p>
  <p>
    I received my M.S. in Mechanical Engineering from Stanford University, where I worked on the design and control of soft robotic systems. Prior to that, I completed my B.Eng. in Honours Mechanical Engineering at McGill University, where I was involved in various research projects related to unmanned aerial vehicles and aerodynamics.
  </p>

